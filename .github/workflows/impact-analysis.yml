name: Impact Analysis (Natural Language)

on:
  workflow_dispatch:
    inputs:
      request_text:
        description: Solicitação em linguagem natural
        required: true
        type: string

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate impact report
        run: |
          node scripts/governance/analyze-impact.js "${{ inputs.request_text }}" > impact-analysis.md

      - name: Publish summary
        run: cat impact-analysis.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: impact-analysis-report
          path: impact-analysis.md
