name: Governance Orchestrator (Central)

on:
  workflow_dispatch:
    inputs:
      domain_ref:
        description: Ref do fastroute-domain (branch, tag ou SHA)
        required: true
        default: main
        type: string
      api_ref:
        description: Ref do fastroute-api (branch, tag ou SHA)
        required: true
        default: main
        type: string
      mobile_ref:
        description: Ref do fastroute-mobile-hybrid (branch, tag ou SHA)
        required: true
        default: main
        type: string
      mobile_profile:
        description: Perfil EAS para build dos apps
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      run_release:
        description: Executar build de artefatos mobile + imagem API
        required: true
        default: false
        type: boolean
      deploy_api:
        description: Executar deploy da API na VPS (requer run_release=true)
        required: true
        default: false
        type: boolean

  repository_dispatch:
    types: [governance-ci, governance-release]

permissions:
  contents: read
  packages: write

concurrency:
  group: governance-central-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || format('{0}-{1}-{2}', github.event.action || 'dispatch', github.event.client_payload.source_repo || 'manual', github.event.client_payload.source_sha || github.event.client_payload.head_sha || github.run_id) }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  DOMAIN_REPO: fastroute-domain
  API_REPO: fastroute-api
  MOBILE_REPO: fastroute-mobile-hybrid
  DEFAULT_DOMAIN_REF: main
  DEFAULT_API_REF: main
  DEFAULT_MOBILE_REF: main
  DEFAULT_MOBILE_PROFILE: preview

jobs:
  prepare-implementation:
    name: Prepare Impact Implementation
    runs-on: ubuntu-latest

    outputs:
      domain_ref: ${{ steps.prepare.outputs.domain_ref }}
      api_ref: ${{ steps.prepare.outputs.api_ref }}
      mobile_ref: ${{ steps.prepare.outputs.mobile_ref }}
      ci_approved: ${{ steps.prepare.outputs.ci_approved }}
      domain_impacted: ${{ steps.prepare.outputs.domain_impacted }}
      api_impacted: ${{ steps.prepare.outputs.api_impacted }}
      mobile_impacted: ${{ steps.prepare.outputs.mobile_impacted }}
      domain_needed: ${{ steps.prepare.outputs.domain_needed }}
      impact_summary: ${{ steps.prepare.outputs.impact_summary }}
      impact_viability: ${{ steps.prepare.outputs.impact_viability }}
      implementation_prs: ${{ steps.prepare.outputs.implementation_prs }}

    env:
      BASE_DOMAIN_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.domain_ref || (github.event.action == 'governance-release' && (github.event.client_payload.domain_ref || (github.event.client_payload.source_repo == 'fastroute-domain' && (github.event.client_payload.head_sha || github.event.client_payload.source_sha || github.event.client_payload.head_ref || github.event.client_payload.source_ref)) || 'main') || (github.event.client_payload.source_repo == 'fastroute-domain' && (github.event.client_payload.head_sha || github.event.client_payload.source_sha || github.event.client_payload.head_ref || github.event.client_payload.source_ref) || 'main')) }}
      BASE_API_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.api_ref || (github.event.action == 'governance-release' && (github.event.client_payload.api_ref || (github.event.client_payload.source_repo == 'fastroute-api' && (github.event.client_payload.head_sha || github.event.client_payload.source_sha || github.event.client_payload.head_ref || github.event.client_payload.source_ref)) || 'main') || (github.event.client_payload.source_repo == 'fastroute-api' && (github.event.client_payload.head_sha || github.event.client_payload.source_sha || github.event.client_payload.head_ref || github.event.client_payload.source_ref) || 'main')) }}
      BASE_MOBILE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.mobile_ref || (github.event.action == 'governance-release' && (github.event.client_payload.mobile_ref || (github.event.client_payload.source_repo == 'fastroute-mobile-hybrid' && (github.event.client_payload.head_sha || github.event.client_payload.source_sha || github.event.client_payload.head_ref || github.event.client_payload.source_ref)) || 'main') || (github.event.client_payload.source_repo == 'fastroute-mobile-hybrid' && (github.event.client_payload.head_sha || github.event.client_payload.source_sha || github.event.client_payload.head_ref || github.event.client_payload.source_ref) || 'main')) }}

    steps:
      - name: Prepare refs and optional auto-implementation
        id: prepare
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          RUN_ID: ${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PAYLOAD_APPROVED: ${{ github.event.client_payload.approved == true }}
          PAYLOAD_RUN_CI: ${{ github.event.client_payload.run_ci == true }}
          RUN_AUTO_IMPLEMENT: ${{ github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.auto_implement != false }}
          PRECREATE_BRANCHES: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.precreate_branches == true }}
          IMPACT_JSON: ${{ toJson(github.event.client_payload.impact_analysis) }}
        run: |
          set -euo pipefail

          DOMAIN_REF="$BASE_DOMAIN_REF"
          API_REF="$BASE_API_REF"
          MOBILE_REF="$BASE_MOBILE_REF"

          IMPACT_SUMMARY="N/A"
          IMPACT_VIABILITY="N/A"
          PR_LINES=""
          DOMAIN_IMPACTED="true"
          API_IMPACTED="true"
          MOBILE_IMPACTED="true"
          CI_APPROVED="false"

          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            CI_APPROVED="true"
          elif [ "${EVENT_NAME}" = "repository_dispatch" ] && [ "${EVENT_ACTION}" = "governance-ci" ] && [ "${PAYLOAD_APPROVED}" = "true" ]; then
            CI_APPROVED="true"
          elif [ "${EVENT_NAME}" = "repository_dispatch" ] && [ "${EVENT_ACTION}" = "governance-release" ] && [ "${PAYLOAD_RUN_CI}" = "true" ]; then
            CI_APPROVED="true"
          fi

          repo_impacted() {
            local repo_key="$1"
            KEY="$repo_key" node - <<'NODE'
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          const key = process.env.KEY;
          const map = { domain: 'fastroute-domain', api: 'fastroute-api', mobile: 'fastroute-mobile-hybrid' };
          const impacts = impact.impactos || impact.impacts || {};
          const info = impacts[map[key]] || impacts[key] || {};
          const yes = info.impacto === true || info.impact === true || info.has_impact === true;
          process.stdout.write(yes ? 'true' : 'false');
          NODE
          }

          if [ -n "${IMPACT_JSON:-}" ] && [ "${IMPACT_JSON}" != "null" ] && [ "${IMPACT_JSON}" != "{}" ]; then
            IMPACT_SUMMARY=$(node - <<'NODE'
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          process.stdout.write(String(impact.resumo || impact.summary || 'N/A'));
          NODE
            )
            IMPACT_SUMMARY="$(echo "$IMPACT_SUMMARY" | tr '\n' ' ' | sed 's/[[:space:]]\\+/ /g')"
            IMPACT_VIABILITY=$(node - <<'NODE'
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          const v = impact.viabilidade || impact.viability || {};
          process.stdout.write(String(v.nivel || v.level || 'N/A'));
          NODE
            )

            DOMAIN_IMPACTED="$(repo_impacted domain)"
            API_IMPACTED="$(repo_impacted api)"
            MOBILE_IMPACTED="$(repo_impacted mobile)"
          fi

          DOMAIN_NEEDED="false"
          if [ "${DOMAIN_IMPACTED}" = "true" ] || [ "${API_IMPACTED}" = "true" ] || [ "${MOBILE_IMPACTED}" = "true" ]; then
            DOMAIN_NEEDED="true"
          fi

          create_repo_branch() {
            local repo="$1"
            local repo_key="$2"
            local base_ref="$3"
            local out_var="$4"

            local impacted
            impacted=$(KEY="$repo_key" node - <<'NODE'
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          const key = process.env.KEY;
          const map = { domain: 'fastroute-domain', api: 'fastroute-api', mobile: 'fastroute-mobile-hybrid' };
          const impacts = impact.impactos || impact.impacts || {};
          const info = impacts[map[key]] || impacts[key] || {};
          const yes = info.impacto === true || info.impact === true;
          process.stdout.write(yes ? 'true' : 'false');
          NODE
            )

            if [ "$impacted" != "true" ]; then
              return 0
            fi

            local branch="codex/governance-${RUN_ID}-${repo_key}"
            local workdir
            workdir="$(mktemp -d)"

            git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/${repo}.git" "$workdir/repo"
            cd "$workdir/repo"
            git checkout "$base_ref" || git checkout "origin/$base_ref"

            git checkout -b "$branch"
            mkdir -p .governance/auto

            KEY="$repo_key" REPO="$repo" node - <<'NODE' > ".governance/auto/impact-${RUN_ID}.md"
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          const key = process.env.KEY;
          const repo = process.env.REPO;
          const map = { domain: 'fastroute-domain', api: 'fastroute-api', mobile: 'fastroute-mobile-hybrid' };
          const impacts = impact.impactos || impact.impacts || {};
          const info = impacts[map[key]] || impacts[key] || {};
          const changes = info.mudancas || info.changes || [];
          const tests = info.testes || info.tests || [];
          const summary = impact.resumo || impact.summary || 'N/A';
          const viability = (impact.viabilidade || impact.viability || {}).nivel || (impact.viabilidade || impact.viability || {}).level || 'N/A';

          const lines = [
            '# Auto Implementation Plan',
            '',
            `- Repository: ${repo}`,
            `- Generated by governance run: ${process.env.RUN_ID || 'N/A'}`,
            `- Viability: ${viability}`,
            '',
            '## Impact Summary',
            summary,
            '',
            '## Proposed Changes'
          ];

          if (Array.isArray(changes) && changes.length > 0) {
            for (const c of changes) lines.push(`- ${c}`);
          } else {
            lines.push('- No repository-specific change list found in impact payload.');
          }

          lines.push('', '## Suggested Tests');
          if (Array.isArray(tests) && tests.length > 0) {
            for (const t of tests) lines.push(`- ${t}`);
          } else {
            lines.push('- No repository-specific test list found in impact payload.');
          }

          lines.push('', '## Status', '- Branch and PR created automatically by governance orchestrator.');
          process.stdout.write(lines.join('\n') + '\n');
          NODE

            KEY="$repo_key" node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          const key = process.env.KEY;
          const payload = {
            generatedAt: new Date().toISOString(),
            runId: process.env.RUN_ID || '',
            summary: impact.resumo || impact.summary || '',
            viability: impact.viabilidade || impact.viability || {},
            impacts: impact.impactos || impact.impacts || {},
            acceptance: impact.criterios_aceite_mapeados || impact.acceptance_criteria_mapped || [],
            risks: impact.riscos || impact.risks || [],
            questions: impact.duvidas || impact.questions || []
          };

          let filePath = '';
          let content = '';

          if (key === 'domain') {
            filePath = path.join('src', 'governance', 'impactPlan.auto.ts');
            content = `export const governanceImpactPlan = ${JSON.stringify(payload, null, 2)} as const;\n`;
          } else if (key === 'api') {
            filePath = path.join('src', 'governance', 'impactPlan.auto.js');
            content = `'use strict';\n\nconst governanceImpactPlan = ${JSON.stringify(payload, null, 2)};\n\nmodule.exports = { governanceImpactPlan };\n`;
          } else if (key === 'mobile') {
            filePath = path.join('src', 'governance', 'impactPlan.auto.ts');
            content = `export const governanceImpactPlan = ${JSON.stringify(payload, null, 2)} as const;\n`;
          }

          if (filePath) {
            fs.mkdirSync(path.dirname(filePath), { recursive: true });
            fs.writeFileSync(filePath, content, 'utf8');
          }
          NODE

            if ! git diff --quiet; then
              git config user.name "FastRoute Governance Bot"
              git config user.email "governance-bot@users.noreply.github.com"
              git add -A
              git commit -m "chore(governance): auto implementation plan (${repo_key}) run ${RUN_ID}"
              git push -u origin "$branch"

              local pr_title="Governance Auto Implementation (${repo_key}) - run ${RUN_ID}"
              local pr_base="$base_ref"
              if [[ "$pr_base" =~ ^[0-9a-f]{40}$ ]]; then
                pr_base="main"
              fi
              local pr_body="Auto-generated governance branch based on impact analysis payload.\\n\\n- Repo: ${repo}\\n- Base ref: ${base_ref}\\n- PR base: ${pr_base}\\n- Branch: ${branch}"

              local pr_url
              pr_url=""
              if command -v gh >/dev/null 2>&1; then
                pr_url="$(GH_TOKEN="${TOKEN}" gh api "repos/${OWNER}/${repo}/pulls" \
                  -f title="${pr_title}" \
                  -f head="${branch}" \
                  -f base="${pr_base}" \
                  -f body="${pr_body}" \
                  -q .html_url 2>/dev/null || true)"

                if [ -z "$pr_url" ]; then
                  pr_url="$(GH_TOKEN="${TOKEN}" gh api "repos/${OWNER}/${repo}/pulls?state=open&head=${OWNER}:${branch}" -q '.[0].html_url' 2>/dev/null || true)"
                fi
              fi

              if [ -n "$pr_url" ]; then
                PR_LINES="${PR_LINES}- ${repo}: ${pr_url}\n"
              fi

              eval "$out_var='$branch'"
            fi
          }

          if [ "${PRECREATE_BRANCHES}" = "true" ] && [ "${RUN_AUTO_IMPLEMENT}" = "true" ] && [ -n "${IMPACT_JSON:-}" ] && [ "${IMPACT_JSON}" != "null" ] && [ "${IMPACT_JSON}" != "{}" ]; then
            create_repo_branch "$DOMAIN_REPO" "domain" "$DOMAIN_REF" DOMAIN_REF
            create_repo_branch "$API_REPO" "api" "$API_REF" API_REF
            create_repo_branch "$MOBILE_REPO" "mobile" "$MOBILE_REF" MOBILE_REF
          fi

          {
            echo "domain_ref=$DOMAIN_REF"
            echo "api_ref=$API_REF"
            echo "mobile_ref=$MOBILE_REF"
            echo "ci_approved=$CI_APPROVED"
            echo "domain_impacted=$DOMAIN_IMPACTED"
            echo "api_impacted=$API_IMPACTED"
            echo "mobile_impacted=$MOBILE_IMPACTED"
            echo "domain_needed=$DOMAIN_NEEDED"
            echo "impact_summary=$IMPACT_SUMMARY"
            echo "impact_viability=$IMPACT_VIABILITY"
            echo "implementation_prs<<EOF"
            printf "%b" "$PR_LINES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish preparation summary
        env:
          PREP_DOMAIN_REF: ${{ steps.prepare.outputs.domain_ref }}
          PREP_API_REF: ${{ steps.prepare.outputs.api_ref }}
          PREP_MOBILE_REF: ${{ steps.prepare.outputs.mobile_ref }}
          PREP_CI_APPROVED: ${{ steps.prepare.outputs.ci_approved }}
          PREP_IMPACT_SUMMARY: ${{ steps.prepare.outputs.impact_summary }}
          PREP_IMPACT_VIABILITY: ${{ steps.prepare.outputs.impact_viability }}
          PREP_IMPLEMENTATION_PRS: ${{ steps.prepare.outputs.implementation_prs }}
        run: |
          set -euo pipefail
          {
            echo "## Implementation Preparation"
            echo "- Domain ref: ${PREP_DOMAIN_REF}"
            echo "- API ref: ${PREP_API_REF}"
            echo "- Mobile ref: ${PREP_MOBILE_REF}"
            echo "- CI approved gate: ${PREP_CI_APPROVED}"
            echo "- Impact summary:"
            if [ -n "${PREP_IMPACT_SUMMARY:-}" ]; then
              echo '```json'
              printf '%s\n' "${PREP_IMPACT_SUMMARY}"
              echo '```'
            else
              echo "  - none"
            fi
            echo "- Impact viability: ${PREP_IMPACT_VIABILITY:-N/A}"
            echo "- Auto-implementation PRs:"
            if [ -n "${PREP_IMPLEMENTATION_PRS:-}" ]; then
              printf "%b\n" "${PREP_IMPLEMENTATION_PRS}"
            else
              echo "  - none"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  implement-changes:
    name: Implement Impact Changes (Precomputed)
    runs-on: ubuntu-latest
    needs: [prepare-implementation]
    outputs:
      implementation_log: ${{ steps.impl.outputs.implementation_log }}

    steps:
      - name: Checkout changemanagement
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Auto-implement impacted repositories
        id: impl
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          RUN_ID: ${{ github.run_id }}
          IMPACT_JSON: ${{ toJson(github.event.client_payload.impact_analysis) }}
          CODE_CHANGES_JSON: ${{ toJson(github.event.client_payload.code_changes) }}
          RUN_AUTO_IMPLEMENT: ${{ github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.auto_implement != false }}
          DOMAIN_REF: ${{ needs.prepare-implementation.outputs.domain_ref }}
          API_REF: ${{ needs.prepare-implementation.outputs.api_ref }}
          MOBILE_REF: ${{ needs.prepare-implementation.outputs.mobile_ref }}
        run: |
          set -euo pipefail

          if [ "${RUN_AUTO_IMPLEMENT}" != "true" ]; then
            {
              echo "implementation_log<<EOF"
              echo "- Auto-implementation desativada para este evento."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${IMPACT_JSON:-}" ] || [ "${IMPACT_JSON}" = "null" ] || [ "${IMPACT_JSON}" = "{}" ]; then
            {
              echo "implementation_log<<EOF"
              echo "- Sem impact_analysis no payload; nenhuma change foi implementada."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${CODE_CHANGES_JSON:-}" ] || [ "${CODE_CHANGES_JSON}" = "null" ] || [ "${CODE_CHANGES_JSON}" = "[]" ] || [ "${CODE_CHANGES_JSON}" = "{}" ]; then
            {
              echo "implementation_log<<EOF"
              echo "- Sem code_changes no payload; nenhuma change foi implementada."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s' "${IMPACT_JSON}" > impact.json
          printf '%s' "${CODE_CHANGES_JSON}" > code_changes.json

          LOG_LINES=""

          run_repo() {
            local repo="$1"
            local key="$2"
            local ref="$3"

            local json
            if ! json=$(node scripts/governance/auto-implement-repo.js \
              --owner "${OWNER}" \
              --repo "${repo}" \
              --repo_key "${key}" \
              --ref "${ref}" \
              --run_id "${RUN_ID}" \
              --impact_json_file impact.json \
              --code_changes_json_file code_changes.json \
              --token "${TOKEN}" \
               2>&1); then
              local err
              err="$(printf '%s' "${json}" | tr '\n' ' ' | cut -c1-1000)"
              LOG_LINES="${LOG_LINES}- ${repo}: failed (${err})\n"
              return 0
            fi

            local status branch commit
            status=$(node -e "const r=JSON.parse(process.argv[1]); process.stdout.write(String(r.status||''));" "${json}")
            branch=$(node -e "const r=JSON.parse(process.argv[1]); process.stdout.write(String(r.branch||''));" "${json}")
            commit=$(node -e "const r=JSON.parse(process.argv[1]); process.stdout.write(String(r.commit||''));" "${json}")

            if [ "${status}" = "implemented" ]; then
              local pr_base pr_title pr_body pr_url
              pr_base="${ref}"
              if [[ "${pr_base}" =~ ^codex/ ]]; then
                pr_base="main"
              fi
              if [[ "${pr_base}" =~ ^[0-9a-f]{40}$ ]]; then
                pr_base="main"
              fi

              pr_title="Governance Auto Implementation (${key}) - run ${RUN_ID}"
              pr_body="Auto-generated governance implementation. Repo=${repo}, Run=${RUN_ID}, Branch=${branch}, Base=${pr_base}."
              pr_url=""

              if command -v gh >/dev/null 2>&1; then
                pr_url="$(GH_TOKEN="${TOKEN}" gh api "repos/${OWNER}/${repo}/pulls?state=open&head=${OWNER}:${branch}" -q '.[0].html_url' 2>/dev/null || true)"

                if [ -z "$pr_url" ]; then
                  pr_url="$(GH_TOKEN="${TOKEN}" gh api "repos/${OWNER}/${repo}/pulls" \
                    -f title="${pr_title}" \
                    -f head="${OWNER}:${branch}" \
                    -f base="${pr_base}" \
                    -f body="${pr_body}" \
                    -q .html_url 2>/dev/null || true)"
                fi
              fi

              if [ -z "$pr_url" ]; then
                LOG_LINES="${LOG_LINES}- ${repo}: implemented but PR creation failed (branch=${branch}, base=${pr_base})\n"
                return 0
              fi

              LOG_LINES="${LOG_LINES}- ${repo}: implemented (branch=${branch}, commit=${commit}, pr=${pr_url})\n"
            else
              LOG_LINES="${LOG_LINES}- ${repo}: ${status}\n"
            fi
          }

          run_repo "${DOMAIN_REPO}" "domain" "${DOMAIN_REF}"
          run_repo "${API_REPO}" "api" "${API_REF}"
          run_repo "${MOBILE_REPO}" "mobile" "${MOBILE_REF}"

          {
            echo "implementation_log<<EOF"
            if [ -n "${LOG_LINES}" ]; then
              printf "%b" "${LOG_LINES}"
            else
              echo "- Nenhuma alteração aplicada."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish implementation summary
        run: |
          {
            echo "## Auto Implementation";
            if [ -n "${{ steps.impl.outputs.implementation_log }}" ]; then
              printf "%b\n" "${{ steps.impl.outputs.implementation_log }}";
            else
              echo "- Nenhuma informação de implementação disponível.";
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  quality-gates-unit:
    name: Quality Gates (Unit + Integration)
    runs-on: ubuntu-latest
    needs: [prepare-implementation, implement-changes]
    if: ${{ needs.prepare-implementation.outputs.ci_approved == 'true' && (needs.prepare-implementation.outputs.domain_impacted == 'true' || needs.prepare-implementation.outputs.api_impacted == 'true' || needs.prepare-implementation.outputs.mobile_impacted == 'true') }}
    env:
      DOMAIN_IMPACTED: ${{ needs.prepare-implementation.outputs.domain_impacted }}
      API_IMPACTED: ${{ needs.prepare-implementation.outputs.api_impacted }}
      MOBILE_IMPACTED: ${{ needs.prepare-implementation.outputs.mobile_impacted }}
      DOMAIN_NEEDED: ${{ needs.prepare-implementation.outputs.domain_needed }}

    steps:
      - name: Checkout domain
        if: ${{ needs.prepare-implementation.outputs.domain_needed == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ needs.prepare-implementation.outputs.domain_ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: domain

      - name: Checkout API
        if: ${{ needs.prepare-implementation.outputs.api_impacted == 'true' || needs.prepare-implementation.outputs.domain_impacted == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.API_REPO) }}
          ref: ${{ needs.prepare-implementation.outputs.api_ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: api

      - name: Checkout mobile
        if: ${{ needs.prepare-implementation.outputs.mobile_impacted == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ needs.prepare-implementation.outputs.mobile_ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            domain/package-lock.json
            api/package-lock.json
            mobile/package-lock.json

      - name: Domain - prepare package (and full gates when impacted)
        if: ${{ needs.prepare-implementation.outputs.domain_needed == 'true' }}
        run: |
          cd domain
          npm ci
          if [ "${DOMAIN_IMPACTED}" = "true" ]; then
            npm run lint
            npm run typecheck
            npm run test
            npm run build
          fi
          npm pack

      - name: API - lint/typecheck/test/build
        if: ${{ needs.prepare-implementation.outputs.api_impacted == 'true' || needs.prepare-implementation.outputs.domain_impacted == 'true' }}
        run: |
          cd api
          npm ci
          npm install --no-save ../domain/*.tgz
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: API - sync regression tests (governance-ci hard gate)
        if: ${{ needs.prepare-implementation.outputs.api_impacted == 'true' || needs.prepare-implementation.outputs.domain_impacted == 'true' }}
        run: |
          cd api
          node --test test/sync-api.test.js

      - name: Mobile - typecheck/unit tests
        if: ${{ needs.prepare-implementation.outputs.mobile_impacted == 'true' }}
        run: |
          cd mobile
          npm install --no-audit --no-fund
          npm install --no-save ../domain/*.tgz
          npm run typecheck
          npm run test:unit

  prepare-mobile-ui-artifacts:
    name: Prepare Mobile UI Artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [prepare-implementation, implement-changes, quality-gates-unit]
    if: ${{ needs.prepare-implementation.outputs.ci_approved == 'true' && needs.prepare-implementation.outputs.mobile_impacted == 'true' }}
    env:
      RESOLVED_MOBILE_REF: ${{ needs.prepare-implementation.outputs.mobile_ref }}

    outputs:
      mobile_ui_run_id: ${{ steps.resolve.outputs.mobile_ui_run_id }}
      mobile_ui_sha: ${{ steps.resolve.outputs.mobile_ui_sha }}

    steps:
      - name: Resolve artifact run by mobile SHA
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          TARGET_REPO: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          TARGET_REF: ${{ env.RESOLVED_MOBILE_REF }}
        run: |
          set -euo pipefail

          WORKFLOW_FILE="mobile-ui-artifacts.yml"
          MAX_POLLS=45
          SLEEP_SECONDS=20

          MOBILE_SHA="$(gh api "repos/${TARGET_REPO}/commits/${TARGET_REF}" -q .sha)"
          echo "Resolved mobile sha: ${MOBILE_SHA}"
          echo "mobile_ui_sha=${MOBILE_SHA}" >> "$GITHUB_OUTPUT"

          run_id=""
          run_status=""
          run_conclusion=""

          for attempt in $(seq 1 "$MAX_POLLS"); do
            runs_json="$(gh api "repos/${TARGET_REPO}/actions/workflows/${WORKFLOW_FILE}/runs?per_page=100")"

            run_id="$(echo "$runs_json" | jq -r --arg sha "$MOBILE_SHA" '.workflow_runs | map(select(.head_sha == $sha)) | sort_by(.created_at) | reverse | .[0].id // empty')"

            if [ -z "$run_id" ]; then
              echo "Sem run de artefatos para ${MOBILE_SHA} (tentativa ${attempt}/${MAX_POLLS})."
              sleep "$SLEEP_SECONDS"
              continue
            fi

            run_status="$(echo "$runs_json" | jq -r --argjson rid "$run_id" '.workflow_runs[] | select(.id == $rid) | .status')"
            run_conclusion="$(echo "$runs_json" | jq -r --argjson rid "$run_id" '.workflow_runs[] | select(.id == $rid) | .conclusion')"

            echo "Run ${run_id} status=${run_status} conclusion=${run_conclusion} (attempt ${attempt}/${MAX_POLLS})"

            if [ "$run_status" = "completed" ]; then
              if [ "$run_conclusion" != "success" ]; then
                echo "Run de artefatos não teve sucesso para ${MOBILE_SHA}: ${run_conclusion}" >&2
                exit 1
              fi
              break
            fi

            sleep "$SLEEP_SECONDS"
          done

          if [ -z "$run_id" ] || [ "$run_status" != "completed" ] || [ "$run_conclusion" != "success" ]; then
            echo "Não foi possível obter artefatos mobile prontos para ${MOBILE_SHA}." >&2
            exit 1
          fi

          echo "mobile_ui_run_id=${run_id}" >> "$GITHUB_OUTPUT"
          echo "Mobile artifact run: https://github.com/${TARGET_REPO}/actions/runs/${run_id}"

  quality-gates-mobile-ui-android:
    name: Quality Gates (Mobile UI Android - Firebase Robo)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [prepare-implementation, implement-changes, quality-gates-unit, prepare-mobile-ui-artifacts]
    if: ${{ needs.prepare-implementation.outputs.ci_approved == 'true' && needs.prepare-implementation.outputs.mobile_impacted == 'true' }}
    env:
      MOBILE_UI_RUN_ID: ${{ needs.prepare-mobile-ui-artifacts.outputs.mobile_ui_run_id }}

    steps:
      - name: Checkout changemanagement
        uses: actions/checkout@v4

      - name: Download Android APK artifact
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          TARGET_REPO: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
        run: |
          set -euo pipefail
          mkdir -p mobile-ui-artifacts/android
          gh run download "${MOBILE_UI_RUN_ID}" \
            -R "${TARGET_REPO}" \
            -n mobile-ui-android-apk \
            -D mobile-ui-artifacts/android
          APK_PATH="$(find mobile-ui-artifacts/android -type f -name 'app-debug.apk' | head -n1 || true)"
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "APK não encontrado no artifact do mobile." >&2
            exit 1
          fi
          echo "ANDROID_APP_APK=${GITHUB_WORKSPACE}/${APK_PATH}" >> "$GITHUB_ENV"
          echo "APK resolved: ${GITHUB_WORKSPACE}/${APK_PATH}"

      - name: Authenticate Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Mobile Android UI (Robo auto-crawl)
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          ANDROID_APP_APK: ${{ env.ANDROID_APP_APK }}
          ANDROID_ROBO_TIMEOUT: 180s
          ANDROID_ROBO_RESULTS_DIR: governance-ci/${{ github.run_id }}/android-robo
          ANDROID_ROBO_DEVICE_MODEL: Nexus6
          ANDROID_ROBO_VERSION: "30"
          ANDROID_ROBO_LOCALE: pt_BR
          ANDROID_ROBO_ORIENTATION: portrait
        run: ./scripts/e2e/run-android-robo-testlab.sh

  quality-gates-mobile-ui-ios:
    name: Quality Gates (Mobile UI iOS - Simulator)
    runs-on: macos-latest
    timeout-minutes: 10
    needs: [prepare-implementation, implement-changes, quality-gates-unit, prepare-mobile-ui-artifacts]
    if: ${{ needs.prepare-implementation.outputs.ci_approved == 'true' && needs.prepare-implementation.outputs.mobile_impacted == 'true' }}
    env:
      RESOLVED_MOBILE_REF: ${{ needs.prepare-implementation.outputs.mobile_ref }}
      MOBILE_UI_RUN_ID: ${{ needs.prepare-mobile-ui-artifacts.outputs.mobile_ui_run_id }}

    steps:
      - name: Checkout changemanagement
        uses: actions/checkout@v4

      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ env.RESOLVED_MOBILE_REF }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download iOS simulator app artifact
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          TARGET_REPO: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
        run: |
          set -euo pipefail
          mkdir -p mobile-ui-artifacts/ios
          gh run download "${MOBILE_UI_RUN_ID}" \
            -R "${TARGET_REPO}" \
            -n mobile-ui-ios-simulator-app \
            -D mobile-ui-artifacts/ios
          ZIP_PATH="$(find mobile-ui-artifacts/ios -type f -name 'FastRoute.app.zip' | head -n1 || true)"
          if [ -z "$ZIP_PATH" ] || [ ! -f "$ZIP_PATH" ]; then
            echo "Artifact iOS (.zip) não encontrado." >&2
            exit 1
          fi
          mkdir -p mobile-ui-artifacts/ios/unpacked
          unzip -q "$ZIP_PATH" -d mobile-ui-artifacts/ios/unpacked
          IOS_APP_PATH="$(find mobile-ui-artifacts/ios/unpacked -type d -name 'FastRoute.app' | head -n1 || true)"
          if [ -z "$IOS_APP_PATH" ] || [ ! -d "$IOS_APP_PATH" ]; then
            echo "FastRoute.app não encontrado após extração." >&2
            exit 1
          fi
          echo "IOS_APP_PATH=${GITHUB_WORKSPACE}/${IOS_APP_PATH}" >> "$GITHUB_ENV"
          echo "iOS app resolved: ${GITHUB_WORKSPACE}/${IOS_APP_PATH}"

      - name: Mobile iOS UI (simulator crawler)
        env:
          MOBILE_DIR: ${{ github.workspace }}/mobile
          IOS_SIMULATOR_NAME: iPhone 15
          IOS_UI_SCRIPT_NAME: test:ui:ios:crawler
          IOS_APP_PATH: ${{ env.IOS_APP_PATH }}
        run: ./scripts/e2e/run-ios-ui-simulator.sh

  build-mobile-artifacts:
    name: Build APK + iOS package (internal)
    runs-on: ubuntu-latest
    needs: [prepare-implementation, quality-gates-unit, quality-gates-mobile-ui-android, quality-gates-mobile-ui-ios]
    if: ${{ needs.prepare-implementation.outputs.ci_approved == 'true' && ((github.event_name == 'workflow_dispatch' && inputs.run_release) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.run_release != false)) && (needs.prepare-implementation.outputs.mobile_ref != 'main' || (github.event_name == 'workflow_dispatch' && inputs.domain_ref == 'main' && inputs.api_ref == 'main' && inputs.mobile_ref == 'main') || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.source_repo == 'fastroute-mobile-hybrid')) }}
    env:
      RESOLVED_MOBILE_REF: ${{ needs.prepare-implementation.outputs.mobile_ref }}
      RESOLVED_MOBILE_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.mobile_profile || github.event.client_payload.mobile_profile || 'preview' }}

    outputs:
      android_url: ${{ steps.urls.outputs.android_url }}
      ios_url: ${{ steps.urls.outputs.ios_url }}

    steps:
      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ env.RESOLVED_MOBILE_REF }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build Android artifact
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas build --platform android --profile "${{ env.RESOLVED_MOBILE_PROFILE }}" --non-interactive --wait --json > ../android-build.json

      - name: Build iOS artifact
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas build --platform ios --profile "${{ env.RESOLVED_MOBILE_PROFILE }}" --non-interactive --wait --json > ../ios-build.json

      - name: Capture artifact URLs
        id: urls
        run: |
          ANDROID_URL=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('android-build.json','utf8')); const i=Array.isArray(r)?r[0]:r; process.stdout.write(i?.artifacts?.buildUrl || i?.buildUrl || 'N/A');")
          IOS_URL=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('ios-build.json','utf8')); const i=Array.isArray(r)?r[0]:r; process.stdout.write(i?.artifacts?.buildUrl || i?.buildUrl || 'N/A');")
          echo "android_url=$ANDROID_URL" >> "$GITHUB_OUTPUT"
          echo "ios_url=$IOS_URL" >> "$GITHUB_OUTPUT"

      - name: Upload raw EAS responses
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-responses-${{ github.run_id }}
          path: |
            android-build.json
            ios-build.json

  build-api-image:
    name: Build & Push API Docker image
    runs-on: ubuntu-latest
    needs: [prepare-implementation, quality-gates-unit]
    if: ${{ needs.prepare-implementation.outputs.ci_approved == 'true' && ((github.event_name == 'workflow_dispatch' && (inputs.run_release || inputs.deploy_api)) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && (github.event.client_payload.run_release != false || github.event.client_payload.deploy_api == true)) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-ci' && (github.event.client_payload.source_repo == 'fastroute-api' || github.event.client_payload.source_repo == 'fastroute-domain'))) }}
    env:
      RESOLVED_API_REF: ${{ needs.prepare-implementation.outputs.api_ref }}

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      api_sha: ${{ steps.meta.outputs.api_sha }}

    steps:
      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.API_REPO) }}
          ref: ${{ env.RESOLVED_API_REF }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: api

      - name: Create image tag
        id: meta
        run: |
          API_SHA=$(git -C api rev-parse --short=12 HEAD)
          echo "api_sha=$API_SHA" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${API_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ghcr.io/${{ secrets.GHCR_USERNAME }}/fastroute-api:latest
            ghcr.io/${{ secrets.GHCR_USERNAME }}/fastroute-api:${{ steps.meta.outputs.image_tag }}

  publish-domain-npm:
    name: Publish Domain Package to NPM
    runs-on: ubuntu-latest
    needs: [prepare-implementation, quality-gates-unit]
    if: ${{ needs.prepare-implementation.outputs.ci_approved == 'true' && ((github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.publish_domain == true) || (github.event_name == 'workflow_dispatch' && false)) }}
    env:
      RESOLVED_DOMAIN_REF: ${{ needs.prepare-implementation.outputs.domain_ref }}

    outputs:
      package_name: ${{ steps.meta.outputs.package_name }}
      package_version: ${{ steps.meta.outputs.package_version }}

    steps:
      - name: Checkout domain
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ env.RESOLVED_DOMAIN_REF }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: domain

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: domain/package-lock.json

      - name: Install and build domain package
        run: |
          cd domain
          npm ci
          npm run build

      - name: Package metadata
        id: meta
        run: |
          cd domain
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "package_name=$PKG_NAME" >> "$GITHUB_OUTPUT"
          echo "package_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate NPM token
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NPM_TOKEN:-}" ]; then
            echo "NPM_TOKEN não configurado."
            exit 1
          fi

      - name: Check version availability
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          PKG="${{ steps.meta.outputs.package_name }}"
          VER="${{ steps.meta.outputs.package_version }}"
          if npm view "${PKG}@${VER}" version >/dev/null 2>&1; then
            echo "Versão já publicada no NPM: ${PKG}@${VER}"
            exit 1
          fi

      - name: Publish package
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          cd domain
          npm publish --access public

  deploy-api:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    needs: [prepare-implementation, build-api-image]
    if: ${{ needs.prepare-implementation.outputs.ci_approved == 'true' && ((github.event_name == 'workflow_dispatch' && inputs.deploy_api) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.deploy_api == true) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-ci' && (github.event.client_payload.source_repo == 'fastroute-api' || github.event.client_payload.source_repo == 'fastroute-domain'))) }}
    concurrency:
      group: governance-api-vps-deploy
      cancel-in-progress: false

    steps:
      - name: Wait for VPS SSH availability
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          set -euo pipefail
          echo "Aguardando conectividade SSH com ${VPS_HOST}:22 ..."

          for attempt in $(seq 1 18); do
            if timeout 5 bash -c "cat < /dev/null > /dev/tcp/${VPS_HOST}/22" 2>/dev/null; then
              echo "SSH disponível na tentativa ${attempt}."
              exit 0
            fi

            echo "Tentativa ${attempt}/18 sem conectividade SSH. Nova tentativa em 10s..."
            sleep 10
          done

          echo "Falha ao conectar na VPS via SSH após múltiplas tentativas."
          exit 1

      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 60s
          command_timeout: 15m
          script: |
            set -euo pipefail
            cd /home/deploy/fastroute

            IMAGE=ghcr.io/${{ secrets.GHCR_USERNAME }}/fastroute-api:${{ needs.build-api-image.outputs.image_tag }}
            LATEST=ghcr.io/${{ secrets.GHCR_USERNAME }}/fastroute-api:latest
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "$IMAGE"
            PULLED_IMAGE_ID=$(docker image inspect "$IMAGE" --format '{{.Id}}')
            docker tag "$IMAGE" "$LATEST"
            docker compose up -d --pull never --force-recreate --remove-orphans

            RUNNING_IMAGE_ID=$(docker inspect fastroute-api --format '{{.Image}}')
            if [ "$RUNNING_IMAGE_ID" != "$PULLED_IMAGE_ID" ]; then
              echo "Deploy inconsistente: container em execução não corresponde à imagem publicada."
              echo "Esperado: $PULLED_IMAGE_ID"
              echo "Atual: $RUNNING_IMAGE_ID"
              exit 1
            fi

            HEALTH_URLS=(
              "https://fastroute.oliversoft.tech/health"
              "http://127.0.0.1/health"
              "http://127.0.0.1:3002/health"
            )
            HEALTH_JSON=""
            for url in "${HEALTH_URLS[@]}"; do
              if HEALTH_JSON=$(curl -fsS --max-time 10 "$url" 2>/dev/null); then
                break
              fi
            done

            if [ -z "$HEALTH_JSON" ]; then
              echo "Falha no health check pós-deploy."
              exit 1
            fi

            echo "Health pós-deploy: $HEALTH_JSON"
            echo "$HEALTH_JSON" | grep -q '"version"' || { echo "Health não contém campo version."; exit 1; }

            docker logout ghcr.io || true
            docker image prune -f

  governance-summary:
    name: Governance Summary
    runs-on: ubuntu-latest
    needs: [prepare-implementation, implement-changes, quality-gates-unit, quality-gates-mobile-ui-android, quality-gates-mobile-ui-ios]
    if: ${{ always() }}

    steps:
      - name: Publish summary
        env:
          SUMMARY_TRIGGER: ${{ github.event_name }}
          SUMMARY_SOURCE_REPO: ${{ github.event.client_payload.source_repo || 'manual' }}
          SUMMARY_DOMAIN_REF: ${{ needs.prepare-implementation.outputs.domain_ref }}
          SUMMARY_API_REF: ${{ needs.prepare-implementation.outputs.api_ref }}
          SUMMARY_MOBILE_REF: ${{ needs.prepare-implementation.outputs.mobile_ref }}
          SUMMARY_RUN_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.run_release || (github.event.action == 'governance-release' && (github.event.client_payload.run_release != false) || false) }}
          SUMMARY_DEPLOY_API: ${{ (github.event_name == 'workflow_dispatch' && inputs.deploy_api) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.deploy_api == true) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-ci' && (github.event.client_payload.source_repo == 'fastroute-api' || github.event.client_payload.source_repo == 'fastroute-domain')) }}
          SUMMARY_IMPACT: ${{ needs.prepare-implementation.outputs.impact_summary }}
          SUMMARY_VIABILITY: ${{ needs.prepare-implementation.outputs.impact_viability }}
          SUMMARY_IMPL_LOG: ${{ needs.implement-changes.outputs.implementation_log }}
          SUMMARY_IMPL_PRS: ${{ needs.prepare-implementation.outputs.implementation_prs }}
          SUMMARY_UI_ANDROID: ${{ needs['quality-gates-mobile-ui-android'].result }}
          SUMMARY_UI_IOS: ${{ needs['quality-gates-mobile-ui-ios'].result }}
        run: |
          set -euo pipefail
          {
            echo "## FastRoute Governance (Central)"
            echo "- Trigger: ${SUMMARY_TRIGGER}"
            echo "- Source repo: ${SUMMARY_SOURCE_REPO}"
            echo "- Domain ref: ${SUMMARY_DOMAIN_REF}"
            echo "- API ref: ${SUMMARY_API_REF}"
            echo "- Mobile ref: ${SUMMARY_MOBILE_REF}"
            echo "- Run release: ${SUMMARY_RUN_RELEASE}"
            echo "- Deploy API: ${SUMMARY_DEPLOY_API}"
            echo "- Impact summary:"
            if [ -n "${SUMMARY_IMPACT:-}" ]; then
              echo '```json'
              printf '%s\n' "${SUMMARY_IMPACT}"
              echo '```'
            else
              echo "  - none"
            fi
            echo "- Impact viability: ${SUMMARY_VIABILITY:-N/A}"
            echo "- Auto-implementation (code stage):"
            if [ -n "${SUMMARY_IMPL_LOG:-}" ]; then
              printf "%b\n" "${SUMMARY_IMPL_LOG}"
            else
              echo "  - none"
            fi
            echo "- Auto-implementation PRs:"
            if [ -n "${SUMMARY_IMPL_PRS:-}" ]; then
              printf "%b\n" "${SUMMARY_IMPL_PRS}"
            else
              echo "  - none"
            fi
            echo "- Mobile UI Android (Firebase Robo): ${SUMMARY_UI_ANDROID:-not_run}"
            echo "- Mobile UI iOS (Simulator crawler): ${SUMMARY_UI_IOS:-not_run}"
          } >> "$GITHUB_STEP_SUMMARY"

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [build-mobile-artifacts, build-api-image, publish-domain-npm]
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.run_release) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.run_release != false)) }}

    steps:
      - name: Publish release summary
        run: |
          {
            echo "## FastRoute Release Artifacts";
            echo "- APK: ${{ needs.build-mobile-artifacts.outputs.android_url || 'N/A (mobile build skipped)' }}";
            echo "- iOS package: ${{ needs.build-mobile-artifacts.outputs.ios_url || 'N/A (mobile build skipped)' }}";
            echo "- API image tag: ${{ needs.build-api-image.outputs.image_tag }}";
            echo "- Domain package: ${{ needs.publish-domain-npm.outputs.package_name || 'N/A (publish skipped)' }}@${{ needs.publish-domain-npm.outputs.package_version || 'N/A' }}";
            echo "- Deploy API executado: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_api || (github.event.action == 'governance-release' && (github.event.client_payload.deploy_api == true) || false) }}";
          } >> "$GITHUB_STEP_SUMMARY"
