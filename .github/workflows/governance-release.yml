name: Governance Orchestrator (Central)

on:
  workflow_dispatch:
    inputs:
      domain_ref:
        description: Ref do fastroute-domain (branch, tag ou SHA)
        required: true
        default: main
        type: string
      api_ref:
        description: Ref do fastroute-api (branch, tag ou SHA)
        required: true
        default: main
        type: string
      mobile_ref:
        description: Ref do fastroute-mobile-hybrid (branch, tag ou SHA)
        required: true
        default: main
        type: string
      mobile_profile:
        description: Perfil EAS para build dos apps
        required: true
        default: preview
        type: choice
        options:
          - development
          - preview
          - production
      run_release:
        description: Executar build de artefatos mobile + imagem API
        required: true
        default: false
        type: boolean
      deploy_api:
        description: Executar deploy da API na VPS (requer run_release=true)
        required: true
        default: false
        type: boolean

  repository_dispatch:
    types: [governance-ci, governance-release]

permissions:
  contents: read
  packages: write

concurrency:
  group: governance-central-${{ github.event_name }}-${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.client_payload.source_repo }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DOMAIN_REPO: fastroute-domain
  API_REPO: fastroute-api
  MOBILE_REPO: fastroute-mobile-hybrid
  DEFAULT_DOMAIN_REF: main
  DEFAULT_API_REF: main
  DEFAULT_MOBILE_REF: main
  DEFAULT_MOBILE_PROFILE: preview

jobs:
  prepare-implementation:
    name: Prepare Impact Implementation
    runs-on: ubuntu-latest

    outputs:
      domain_ref: ${{ steps.prepare.outputs.domain_ref }}
      api_ref: ${{ steps.prepare.outputs.api_ref }}
      mobile_ref: ${{ steps.prepare.outputs.mobile_ref }}
      impact_summary: ${{ steps.prepare.outputs.impact_summary }}
      impact_viability: ${{ steps.prepare.outputs.impact_viability }}
      implementation_prs: ${{ steps.prepare.outputs.implementation_prs }}

    env:
      BASE_DOMAIN_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.domain_ref || (github.event.action == 'governance-release' && (github.event.client_payload.domain_ref || 'main') || (github.event.client_payload.source_repo == 'fastroute-domain' && (github.event.client_payload.head_ref || github.event.client_payload.source_ref || github.event.client_payload.head_sha || github.event.client_payload.source_sha) || 'main')) }}
      BASE_API_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.api_ref || (github.event.action == 'governance-release' && (github.event.client_payload.api_ref || 'main') || (github.event.client_payload.source_repo == 'fastroute-api' && (github.event.client_payload.head_ref || github.event.client_payload.source_ref || github.event.client_payload.head_sha || github.event.client_payload.source_sha) || 'main')) }}
      BASE_MOBILE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.mobile_ref || (github.event.action == 'governance-release' && (github.event.client_payload.mobile_ref || 'main') || (github.event.client_payload.source_repo == 'fastroute-mobile-hybrid' && (github.event.client_payload.head_ref || github.event.client_payload.source_ref || github.event.client_payload.head_sha || github.event.client_payload.source_sha) || 'main')) }}

    steps:
      - name: Prepare refs and optional auto-implementation
        id: prepare
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          RUN_ID: ${{ github.run_id }}
          RUN_AUTO_IMPLEMENT: ${{ github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.auto_implement != false }}
          IMPACT_JSON: ${{ toJson(github.event.client_payload.impact_analysis) }}
        run: |
          set -euo pipefail

          DOMAIN_REF="$BASE_DOMAIN_REF"
          API_REF="$BASE_API_REF"
          MOBILE_REF="$BASE_MOBILE_REF"

          IMPACT_SUMMARY="N/A"
          IMPACT_VIABILITY="N/A"
          PR_LINES=""

          if [ -n "${IMPACT_JSON:-}" ] && [ "${IMPACT_JSON}" != "null" ] && [ "${IMPACT_JSON}" != "{}" ]; then
            IMPACT_SUMMARY=$(node - <<'NODE'
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          process.stdout.write(String(impact.resumo || impact.summary || 'N/A'));
          NODE
            )
            IMPACT_SUMMARY="$(echo "$IMPACT_SUMMARY" | tr '\n' ' ' | sed 's/[[:space:]]\\+/ /g')"
            IMPACT_VIABILITY=$(node - <<'NODE'
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          const v = impact.viabilidade || impact.viability || {};
          process.stdout.write(String(v.nivel || v.level || 'N/A'));
          NODE
            )
          fi

          create_repo_branch() {
            local repo="$1"
            local repo_key="$2"
            local base_ref="$3"
            local out_var="$4"

            local impacted
            impacted=$(KEY="$repo_key" node - <<'NODE'
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          const key = process.env.KEY;
          const map = { domain: 'fastroute-domain', api: 'fastroute-api', mobile: 'fastroute-mobile-hybrid' };
          const impacts = impact.impactos || impact.impacts || {};
          const info = impacts[map[key]] || impacts[key] || {};
          const yes = info.impacto === true || info.impact === true;
          process.stdout.write(yes ? 'true' : 'false');
          NODE
            )

            if [ "$impacted" != "true" ]; then
              return 0
            fi

            local branch="codex/governance-${RUN_ID}-${repo_key}"
            local workdir
            workdir="$(mktemp -d)"

            git clone "https://x-access-token:${TOKEN}@github.com/${OWNER}/${repo}.git" "$workdir/repo"
            cd "$workdir/repo"
            git checkout "$base_ref" || git checkout "origin/$base_ref"

            git checkout -b "$branch"
            mkdir -p .governance/auto

            KEY="$repo_key" REPO="$repo" node - <<'NODE' > ".governance/auto/impact-${RUN_ID}.md"
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          const key = process.env.KEY;
          const repo = process.env.REPO;
          const map = { domain: 'fastroute-domain', api: 'fastroute-api', mobile: 'fastroute-mobile-hybrid' };
          const impacts = impact.impactos || impact.impacts || {};
          const info = impacts[map[key]] || impacts[key] || {};
          const changes = info.mudancas || info.changes || [];
          const tests = info.testes || info.tests || [];
          const summary = impact.resumo || impact.summary || 'N/A';
          const viability = (impact.viabilidade || impact.viability || {}).nivel || (impact.viabilidade || impact.viability || {}).level || 'N/A';

          const lines = [
            '# Auto Implementation Plan',
            '',
            `- Repository: ${repo}`,
            `- Generated by governance run: ${process.env.RUN_ID || 'N/A'}`,
            `- Viability: ${viability}`,
            '',
            '## Impact Summary',
            summary,
            '',
            '## Proposed Changes'
          ];

          if (Array.isArray(changes) && changes.length > 0) {
            for (const c of changes) lines.push(`- ${c}`);
          } else {
            lines.push('- No repository-specific change list found in impact payload.');
          }

          lines.push('', '## Suggested Tests');
          if (Array.isArray(tests) && tests.length > 0) {
            for (const t of tests) lines.push(`- ${t}`);
          } else {
            lines.push('- No repository-specific test list found in impact payload.');
          }

          lines.push('', '## Status', '- Branch and PR created automatically by governance orchestrator.');
          process.stdout.write(lines.join('\n') + '\n');
          NODE

            KEY="$repo_key" node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const impact = JSON.parse(process.env.IMPACT_JSON || '{}');
          const key = process.env.KEY;
          const payload = {
            generatedAt: new Date().toISOString(),
            runId: process.env.RUN_ID || '',
            summary: impact.resumo || impact.summary || '',
            viability: impact.viabilidade || impact.viability || {},
            impacts: impact.impactos || impact.impacts || {},
            acceptance: impact.criterios_aceite_mapeados || impact.acceptance_criteria_mapped || [],
            risks: impact.riscos || impact.risks || [],
            questions: impact.duvidas || impact.questions || []
          };

          let filePath = '';
          let content = '';

          if (key === 'domain') {
            filePath = path.join('src', 'governance', 'impactPlan.auto.ts');
            content = `export const governanceImpactPlan = ${JSON.stringify(payload, null, 2)} as const;\n`;
          } else if (key === 'api') {
            filePath = path.join('src', 'governance', 'impactPlan.auto.js');
            content = `'use strict';\n\nconst governanceImpactPlan = ${JSON.stringify(payload, null, 2)};\n\nmodule.exports = { governanceImpactPlan };\n`;
          } else if (key === 'mobile') {
            filePath = path.join('src', 'governance', 'impactPlan.auto.ts');
            content = `export const governanceImpactPlan = ${JSON.stringify(payload, null, 2)} as const;\n`;
          }

          if (filePath) {
            fs.mkdirSync(path.dirname(filePath), { recursive: true });
            fs.writeFileSync(filePath, content, 'utf8');
          }
          NODE

            if ! git diff --quiet; then
              git config user.name "FastRoute Governance Bot"
              git config user.email "governance-bot@users.noreply.github.com"
              git add -A
              git commit -m "chore(governance): auto implementation plan (${repo_key}) run ${RUN_ID}"
              git push -u origin "$branch"

              local pr_title="Governance Auto Implementation (${repo_key}) - run ${RUN_ID}"
              local pr_base="$base_ref"
              if [[ "$pr_base" =~ ^[0-9a-f]{40}$ ]]; then
                pr_base="main"
              fi
              local pr_body="Auto-generated governance branch based on impact analysis payload.\\n\\n- Repo: ${repo}\\n- Base ref: ${base_ref}\\n- PR base: ${pr_base}\\n- Branch: ${branch}"

              local pr_url
              pr_url=""
              if command -v gh >/dev/null 2>&1; then
                pr_url="$(GH_TOKEN="${TOKEN}" gh api "repos/${OWNER}/${repo}/pulls" \
                  -f title="${pr_title}" \
                  -f head="${branch}" \
                  -f base="${pr_base}" \
                  -f body="${pr_body}" \
                  -q .html_url 2>/dev/null || true)"

                if [ -z "$pr_url" ]; then
                  pr_url="$(GH_TOKEN="${TOKEN}" gh api "repos/${OWNER}/${repo}/pulls?state=open&head=${OWNER}:${branch}" -q '.[0].html_url' 2>/dev/null || true)"
                fi
              fi

              if [ -n "$pr_url" ]; then
                PR_LINES="${PR_LINES}- ${repo}: ${pr_url}\n"
              fi

              eval "$out_var='$branch'"
            fi
          }

          if [ "${RUN_AUTO_IMPLEMENT}" = "true" ] && [ -n "${IMPACT_JSON:-}" ] && [ "${IMPACT_JSON}" != "null" ] && [ "${IMPACT_JSON}" != "{}" ]; then
            create_repo_branch "$DOMAIN_REPO" "domain" "$DOMAIN_REF" DOMAIN_REF
            create_repo_branch "$API_REPO" "api" "$API_REF" API_REF
            create_repo_branch "$MOBILE_REPO" "mobile" "$MOBILE_REF" MOBILE_REF
          fi

          {
            echo "domain_ref=$DOMAIN_REF"
            echo "api_ref=$API_REF"
            echo "mobile_ref=$MOBILE_REF"
            echo "impact_summary=$IMPACT_SUMMARY"
            echo "impact_viability=$IMPACT_VIABILITY"
            echo "implementation_prs<<EOF"
            printf "%b" "$PR_LINES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish preparation summary
        run: |
          {
            echo "## Implementation Preparation";
            echo "- Domain ref: ${{ steps.prepare.outputs.domain_ref }}";
            echo "- API ref: ${{ steps.prepare.outputs.api_ref }}";
            echo "- Mobile ref: ${{ steps.prepare.outputs.mobile_ref }}";
            echo "- Impact summary: ${{ steps.prepare.outputs.impact_summary }}";
            echo "- Impact viability: ${{ steps.prepare.outputs.impact_viability }}";
            echo "- Auto-implementation PRs:";
            if [ -n "${{ steps.prepare.outputs.implementation_prs }}" ]; then
              printf "%b\n" "${{ steps.prepare.outputs.implementation_prs }}";
            else
              echo "  - none";
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  implement-changes:
    name: Implement Impact Changes (LLM)
    runs-on: ubuntu-latest
    needs: [prepare-implementation]
    outputs:
      implementation_log: ${{ steps.impl.outputs.implementation_log }}

    steps:
      - name: Checkout changemanagement
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Auto-implement impacted repositories
        id: impl
        env:
          OWNER: ${{ github.repository_owner }}
          TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          RUN_ID: ${{ github.run_id }}
          IMPACT_JSON: ${{ toJson(github.event.client_payload.impact_analysis) }}
          RUN_AUTO_IMPLEMENT: ${{ github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.auto_implement != false }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ github.event.client_payload.openai_model || 'gpt-4o-mini' }}
          DOMAIN_REF: ${{ needs.prepare-implementation.outputs.domain_ref }}
          API_REF: ${{ needs.prepare-implementation.outputs.api_ref }}
          MOBILE_REF: ${{ needs.prepare-implementation.outputs.mobile_ref }}
        run: |
          set -euo pipefail

          if [ "${RUN_AUTO_IMPLEMENT}" != "true" ]; then
            {
              echo "implementation_log<<EOF"
              echo "- Auto-implementation desativada para este evento."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${IMPACT_JSON:-}" ] || [ "${IMPACT_JSON}" = "null" ] || [ "${IMPACT_JSON}" = "{}" ]; then
            {
              echo "implementation_log<<EOF"
              echo "- Sem impact_analysis no payload; nenhuma change foi implementada."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "OPENAI_API_KEY não configurado. Necessário para etapa de codificação automática." >&2
            exit 1
          fi

          printf '%s' "${IMPACT_JSON}" > impact.json

          LOG_LINES=""

          run_repo() {
            local repo="$1"
            local key="$2"
            local ref="$3"

            local json
            json=$(node scripts/governance/auto-implement-repo.js \
              --owner "${OWNER}" \
              --repo "${repo}" \
              --repo_key "${key}" \
              --ref "${ref}" \
              --run_id "${RUN_ID}" \
              --impact_json_file impact.json \
              --token "${TOKEN}" \
              --openai_api_key "${OPENAI_API_KEY}" \
              --model "${OPENAI_MODEL}")

            local status branch commit
            status=$(node -e "const r=JSON.parse(process.argv[1]); process.stdout.write(String(r.status||''));" "${json}")
            branch=$(node -e "const r=JSON.parse(process.argv[1]); process.stdout.write(String(r.branch||''));" "${json}")
            commit=$(node -e "const r=JSON.parse(process.argv[1]); process.stdout.write(String(r.commit||''));" "${json}")

            if [ "${status}" = "implemented" ]; then
              LOG_LINES="${LOG_LINES}- ${repo}: implemented (branch=${branch}, commit=${commit})\n"
            else
              LOG_LINES="${LOG_LINES}- ${repo}: ${status}\n"
            fi
          }

          run_repo "${DOMAIN_REPO}" "domain" "${DOMAIN_REF}"
          run_repo "${API_REPO}" "api" "${API_REF}"
          run_repo "${MOBILE_REPO}" "mobile" "${MOBILE_REF}"

          {
            echo "implementation_log<<EOF"
            if [ -n "${LOG_LINES}" ]; then
              printf "%b" "${LOG_LINES}"
            else
              echo "- Nenhuma alteração aplicada."
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Publish implementation summary
        run: |
          {
            echo "## Auto Implementation";
            if [ -n "${{ steps.impl.outputs.implementation_log }}" ]; then
              printf "%b\n" "${{ steps.impl.outputs.implementation_log }}";
            else
              echo "- Nenhuma informação de implementação disponível.";
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  quality-gates-unit:
    name: Quality Gates (Unit + Integration)
    runs-on: ubuntu-latest
    needs: [prepare-implementation, implement-changes]

    steps:
      - name: Checkout domain
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ needs.prepare-implementation.outputs.domain_ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: domain

      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.API_REPO) }}
          ref: ${{ needs.prepare-implementation.outputs.api_ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: api

      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ needs.prepare-implementation.outputs.mobile_ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Domain - lint/test/build
        run: |
          cd domain
          npm ci
          npm run lint
          npm run typecheck
          npm run test
          npm run build
          npm pack

      - name: API - lint/typecheck/test/build
        run: |
          cd api
          npm ci
          npm install --no-save ../domain/*.tgz
          npm run lint
          npm run typecheck
          npm test
          npm run build

      - name: Mobile - typecheck/unit tests
        run: |
          cd mobile
          npm ci
          npm install --no-save ../domain/*.tgz
          npm run typecheck
          npm run test:unit

  quality-gates-mobile-android:
    name: Quality Gates (Functional UI Android)
    runs-on: ubuntu-latest
    needs: [prepare-implementation, implement-changes, quality-gates-unit]

    steps:
      - name: Checkout domain
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ needs.prepare-implementation.outputs.domain_ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: domain

      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ needs.prepare-implementation.outputs.mobile_ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable KVM for Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Prepare domain package
        run: |
          cd domain
          npm ci
          npm run build
          npm pack

      - name: Build Android debug app
        env:
          EXPO_PUBLIC_E2E_BYPASS_LOGIN: "1"
        run: |
          cd mobile
          npm ci
          npm install --no-save ../domain/*.tgz
          npx expo prebuild -p android --non-interactive
          cd android
          ./gradlew --no-daemon assembleDebug

      - name: Reset ADB state before emulator
        run: |
          adb kill-server || true
          pkill -f "qemu-system|emulator.*-avd" || true
          sleep 2
          adb start-server

      - name: Run Maestro flow on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          arch: x86_64
          target: google_apis
          profile: pixel_6
          cores: 2
          ram-size: 3072M
          heap-size: 1024M
          disk-size: 6144M
          disable-linux-hw-accel: auto
          disable-animations: true
          emulator-options: -no-window -noaudio -no-boot-anim -gpu off -no-snapshot-save -camera-back none -camera-front none
          emulator-boot-timeout: 420
          script: |
            cd mobile
            export MAESTRO_FLOW_TARGET=.maestro/flows
            bash ./scripts/ci/run-maestro-tests.sh android

      - name: Upload Android UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-android-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            mobile/.maestro/results/android
            mobile/.maestro/debug/android-*

  quality-gates-mobile-ios:
    name: Quality Gates (Functional UI iOS)
    runs-on: macos-14
    needs: [prepare-implementation, implement-changes, quality-gates-unit]

    steps:
      - name: Checkout domain
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.DOMAIN_REPO) }}
          ref: ${{ needs.prepare-implementation.outputs.domain_ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: domain

      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ needs.prepare-implementation.outputs.mobile_ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare domain package
        run: |
          cd domain
          npm ci
          npm run build
          npm pack

      - name: Build iOS simulator app
        env:
          EXPO_PUBLIC_E2E_BYPASS_LOGIN: "1"
        run: |
          set -euo pipefail
          cd mobile
          npm ci
          npm install --no-save ../domain/*.tgz
          npx expo prebuild -p ios --non-interactive
          cd ios
          pod install
          cd ..

          SIM_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }')
          if [ -z "$SIM_ID" ]; then
            echo "Nenhum simulador iPhone disponível" >&2
            exit 1
          fi

          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b

          xcodebuild \
            -workspace ios/FastRoute.xcworkspace \
            -scheme FastRoute \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "id=$SIM_ID" \
            -derivedDataPath ios/build \
            build

          APP_PATH=$(find ios/build/Build/Products -type d -name "FastRoute.app" | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "App iOS não encontrada em ios/build/Build/Products" >&2
            exit 1
          fi

          xcrun simctl install booted "$APP_PATH"

      - name: Run Maestro flow on iOS simulator
        run: |
          cd mobile
          export MAESTRO_FLOW_TARGET=.maestro/flows
          bash ./scripts/ci/run-maestro-tests.sh ios

      - name: Upload iOS UI test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-ios-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            mobile/.maestro/results/ios
            mobile/.maestro/debug/ios-*

  build-mobile-artifacts:
    name: Build APK + iOS package (internal)
    runs-on: ubuntu-latest
    needs: [prepare-implementation, quality-gates-unit, quality-gates-mobile-android, quality-gates-mobile-ios]
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_release) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.run_release != false) }}
    env:
      RESOLVED_MOBILE_REF: ${{ needs.prepare-implementation.outputs.mobile_ref }}
      RESOLVED_MOBILE_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.mobile_profile || github.event.client_payload.mobile_profile || 'preview' }}

    outputs:
      android_url: ${{ steps.urls.outputs.android_url }}
      ios_url: ${{ steps.urls.outputs.ios_url }}

    steps:
      - name: Checkout mobile
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.MOBILE_REPO) }}
          ref: ${{ env.RESOLVED_MOBILE_REF }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: mobile

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          cd mobile
          npm ci

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Build Android artifact
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas build --platform android --profile "${{ env.RESOLVED_MOBILE_PROFILE }}" --non-interactive --wait --json > ../android-build.json

      - name: Build iOS artifact
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          cd mobile
          eas build --platform ios --profile "${{ env.RESOLVED_MOBILE_PROFILE }}" --non-interactive --wait --json > ../ios-build.json

      - name: Capture artifact URLs
        id: urls
        run: |
          ANDROID_URL=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('android-build.json','utf8')); const i=Array.isArray(r)?r[0]:r; process.stdout.write(i?.artifacts?.buildUrl || i?.buildUrl || 'N/A');")
          IOS_URL=$(node -e "const fs=require('fs'); const r=JSON.parse(fs.readFileSync('ios-build.json','utf8')); const i=Array.isArray(r)?r[0]:r; process.stdout.write(i?.artifacts?.buildUrl || i?.buildUrl || 'N/A');")
          echo "android_url=$ANDROID_URL" >> "$GITHUB_OUTPUT"
          echo "ios_url=$IOS_URL" >> "$GITHUB_OUTPUT"

      - name: Upload raw EAS responses
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-responses-${{ github.run_id }}
          path: |
            android-build.json
            ios-build.json

  build-api-image:
    name: Build & Push API Docker image
    runs-on: ubuntu-latest
    needs: [prepare-implementation, quality-gates-unit, quality-gates-mobile-android, quality-gates-mobile-ios]
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_release) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.run_release != false) }}
    env:
      RESOLVED_API_REF: ${{ needs.prepare-implementation.outputs.api_ref }}

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout API
        uses: actions/checkout@v4
        with:
          repository: ${{ format('{0}/{1}', github.repository_owner, env.API_REPO) }}
          ref: ${{ env.RESOLVED_API_REF }}
          token: ${{ secrets.CROSS_REPO_PAT }}
          path: api

      - name: Create image tag
        id: meta
        run: echo "image_tag=release-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fastroute-api:latest
            ghcr.io/${{ github.repository_owner }}/fastroute-api:${{ steps.meta.outputs.image_tag }}

  deploy-api:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    needs: [build-api-image]
    if: ${{ (github.event_name == 'workflow_dispatch' && inputs.run_release && inputs.deploy_api) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.run_release != false && github.event.client_payload.deploy_api == true) }}

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/deploy/fastroute

            IMAGE=ghcr.io/${{ github.repository_owner }}/fastroute-api:${{ needs.build-api-image.outputs.image_tag }}
            LATEST=ghcr.io/${{ github.repository_owner }}/fastroute-api:latest

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker pull "$IMAGE"
            docker tag "$IMAGE" "$LATEST"
            docker compose up -d --pull never --force-recreate --remove-orphans

            docker logout ghcr.io || true
            docker image prune -f

  governance-summary:
    name: Governance Summary
    runs-on: ubuntu-latest
    needs: [prepare-implementation, implement-changes, quality-gates-unit, quality-gates-mobile-android, quality-gates-mobile-ios]
    if: ${{ always() }}

    steps:
      - name: Publish summary
        run: |
          {
            echo "## FastRoute Governance (Central)";
            echo "- Trigger: ${{ github.event_name }}";
            echo "- Source repo: ${{ github.event.client_payload.source_repo || 'manual' }}";
            echo "- Domain ref: ${{ needs.prepare-implementation.outputs.domain_ref }}";
            echo "- API ref: ${{ needs.prepare-implementation.outputs.api_ref }}";
            echo "- Mobile ref: ${{ needs.prepare-implementation.outputs.mobile_ref }}";
            echo "- Run release: ${{ github.event_name == 'workflow_dispatch' && inputs.run_release || (github.event.action == 'governance-release' && (github.event.client_payload.run_release != false) || false) }}";
            echo "- Deploy API: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_api || (github.event.action == 'governance-release' && (github.event.client_payload.deploy_api == true) || false) }}";
            echo "- Impact summary: ${{ needs.prepare-implementation.outputs.impact_summary }}";
            echo "- Impact viability: ${{ needs.prepare-implementation.outputs.impact_viability }}";
            echo "- Auto-implementation (code stage):";
            if [ -n "${{ needs.implement-changes.outputs.implementation_log }}" ]; then
              printf "%b\n" "${{ needs.implement-changes.outputs.implementation_log }}";
            else
              echo "  - none";
            fi
            echo "- Auto-implementation PRs:";
            if [ -n "${{ needs.prepare-implementation.outputs.implementation_prs }}" ]; then
              printf "%b\n" "${{ needs.prepare-implementation.outputs.implementation_prs }}";
            else
              echo "  - none";
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [build-mobile-artifacts, build-api-image]
    if: ${{ always() && ((github.event_name == 'workflow_dispatch' && inputs.run_release) || (github.event_name == 'repository_dispatch' && github.event.action == 'governance-release' && github.event.client_payload.run_release != false)) }}

    steps:
      - name: Publish release summary
        run: |
          {
            echo "## FastRoute Release Artifacts";
            echo "- APK: ${{ needs.build-mobile-artifacts.outputs.android_url }}";
            echo "- iOS package: ${{ needs.build-mobile-artifacts.outputs.ios_url }}";
            echo "- API image tag: ${{ needs.build-api-image.outputs.image_tag }}";
            echo "- Deploy API executado: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_api || (github.event.action == 'governance-release' && (github.event.client_payload.deploy_api == true) || false) }}";
          } >> "$GITHUB_STEP_SUMMARY"
